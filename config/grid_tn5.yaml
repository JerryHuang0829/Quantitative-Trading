system:
  mode: tw_stock_portfolio

telegram:
  bot_token_env: TELEGRAM_BOT_TOKEN
  chat_id_env: TELEGRAM_CHAT_ID

check_interval: 900
heartbeat_interval: 86400

database:
  path: data/signals.db

default_strategy:
  sma_fast: 20
  sma_slow: 60
  rsi_period: 14
  rsi_oversold: 30
  rsi_overbought: 70
  bb_period: 20
  bb_std: 2
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  atr_period: 14
  adx_period: 14
  volume_ma_period: 20
  volume_breakout_ratio: 1.5

portfolio:
  profile: tw_3m_stable
  enabled: true
  rebalance_frequency: monthly
  rebalance_day: 12
  rebalance_after_close_hour: 14
  top_n: 5
  hold_buffer: 3
  hold_score_floor: 60
  max_position_weight: 0.25
  min_holdings: 3
  market_proxy_symbol: "0050"
  history_limit: 320
  monthly_revenue_months: 15
  min_price: 20
  min_avg_turnover: 50000000
  exclude_etf: true
  use_monthly_revenue: true
  use_auto_universe: true
  auto_universe_size: 80
  auto_universe_markets: ["twse", "tpex"]
  auto_universe_exclude_industries: ["ETF", "ETN", "受益證券", "存託憑證", "權證"]
  auto_universe_pre_filter_size: 400
  auto_universe_include_symbols: []
  auto_universe_exclude_symbols: []
  exposure:
    risk_on: 0.96
    caution: 0.70
    risk_off: 0.35
  turnover_cost: 0.0047
  turnover_score_threshold: 6.0
  max_same_industry: 2
  weight_mode: score_weighted
  min_eligible_ratio: 0.3
  score_weights:
    price_momentum: 0.55
    trend_quality: 0.20
    revenue_momentum: 0.25
    institutional_flow: 0.00

symbols:
  - name: 台積電
    market: tw_stock
    source: finmind
    symbol: "2330"
    timeframe: D
    enabled: true
    strategy:
      use_institutional: true
