# 開發環境覆寫 — 掛載原始碼方便即時測試
# docker compose up portfolio-bot          → 跑 live bot
# docker compose run --rm backtest --start 2023-01-01 --end 2025-12-31  → 跑回測
# docker compose run --rm dev              → 互動式 Python shell

services:
  portfolio-bot:
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./src:/app/src
      - ./main.py:/app/main.py
      - ./scripts:/app/scripts

  backtest:
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts

  dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tw-portfolio-dev
    profiles: ["tools"]
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
      - ./reports:/app/reports
      - ./main.py:/app/main.py
    entrypoint: ["python", "-u"]
    command: ["-c", "print('Dev shell ready. Use: docker compose run --rm dev python_script.py')"]
    stdin_open: true
    tty: true
